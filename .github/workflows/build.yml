name: Build Installer

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r installer/requirements.txt

      - name: Generate assets
        # Tries cairosvg first; falls back to pure-Pillow drawing if unavailable.
        run: python installer/make_assets.py

      - name: Build EXE with PyInstaller
        run: |
          cd installer
          pyinstaller build.spec --noconfirm

      - name: Compute artifact filename
        id: meta
        shell: pwsh
        run: |
          $version = (Select-String -Path installer/main.py -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $version = $version.TrimStart('v')
          $date = Get-Date -Format "yyyyMMdd"
          $filename = "DinoThemesInstaller-v$version-$date.exe"
          "version=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Rename EXE with version and date
        shell: pwsh
        run: |
          Move-Item -Path installer/dist/DinoThemesInstaller.exe -Destination "installer/dist/${{ steps.meta.outputs.filename }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.filename }}
          path: installer/dist/${{ steps.meta.outputs.filename }}
          if-no-files-found: error

      # ── Release (tag pushes only) ──────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Dino Themes ${{ steps.meta.outputs.version }}"
          body: |
            ## Dino Themes ${{ steps.meta.outputs.version }}

            Download `${{ steps.meta.outputs.filename }}` below and run it to install the theme.

            **Prerequisites** (the installer will check these):
            - [PowerToys](https://github.com/microsoft/PowerToys)
            - [ExplorerPatcher](https://github.com/valinet/ExplorerPatcher)
            - [Files App](https://files.community)
            - [RoundedTB](https://github.com/RoundedTB/RoundedTB)
            - [TranslucentTB](https://github.com/TranslucentTB/TranslucentTB)
            - [Rainmeter](https://www.rainmeter.net)
            - [AutoHotkey v2](https://www.autohotkey.com)
          files: installer/dist/${{ steps.meta.outputs.filename }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
